run_name: "qwen2.5-0.5b"

# Model
model_name: "Qwen/Qwen2.5-0.5B"
device: "cuda"

# Rollout
K: 9
max_depth: 3
max_nodes: 20
lean_workers: 4
lean_timeout: 60

# GRPO
lr: 0.000005
eps_clip: 0.2
beta_kl: 0.01 
grpo_epochs: 1
mini_batch_size: 8

# Training loop
total_iterations: 2
theorems_per_iter: 1
checkpoint_every: 1
checkpoint_dir: "outputs/checkpoints"

# Dataset
dataset_dir: "problems/miniF2F-Valid"

# LoRA
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]


# Training efficiency
gradient_checkpointing: true
max_new_tokens: 1024
temperature: 0.7

# Logging
log_dir: "outputs/runs"

# vLLM
vllm_port: 8000
vllm_gpu_memory_utilization: 0.9
max_model_len: 2048