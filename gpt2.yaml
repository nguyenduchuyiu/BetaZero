run_name: "gpt2"

# Model
model_name: "openai-community/gpt2"
device: "cuda"

# Rollout
K: 3
max_depth: 2
max_nodes: 20
lean_workers: 4
lean_timeout: 60

# GRPO
lr: 0.000005
eps_clip: 0.2
beta_kl: 0.01 
grpo_epochs: 1
mini_batch_size: 8

# Training loop
total_iterations: 2
theorems_per_iter: 1
checkpoint_every: 1
checkpoint_dir: "checkpoints"

# Dataset
dataset_dir: "problems/miniF2F-Valid"

# LoRA
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules: ["c_attn", "c_proj"]

# Training efficiency
gradient_checkpointing: true
max_new_tokens: 128
temperature: 0.7

# Logging
log_dir: "runs"
