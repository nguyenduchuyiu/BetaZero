run_name: "gpt2"

# Model
model_name: "openai-community/gpt2"
device: "cuda"

# Rollout
K: 10
max_depth: 5
max_nodes: 50
lean_workers: 4
lean_timeout: 60

# GRPO
lr: 0.000005
eps_clip: 0.2
beta_kl: 0.01 
grpo_epochs: 1
mini_batch_size: 8

# Training loop
total_iterations: 2
theorems_per_iter: 1
checkpoint_every: 1
checkpoint_dir: "checkpoints"

# Dataset
dataset_dir: "problems/miniF2F-Valid"

# Logging
log_dir: "runs"
